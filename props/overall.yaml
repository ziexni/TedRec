gpu_id: 0
data_path: 'dataset/'

# Data loading
load_col:
  inter: [user_id, item_id, timestamp]

# Evaluation (베이스라인 조건)
eval_args:
  split: {'LS': 'valid_and_test'}  # leave-two-out
  order: TO
  mode: uni100  # 101 candidates
  group_by: user

# Metrics
topk: [10]
metrics: ['Hit', 'NDCG', 'MRR']
valid_metric: NDCG@10
metric_decimal_place: 4

# Training
train_neg_sample_args: ~  # Full softmax
epochs: 100
train_batch_size: 245
eval_batch_size: 2048
learner: adam
learning_rate: 0.001
eval_step: 10
stopping_step: 3

# Sequence
MAX_ITEM_LIST_LENGTH: 50

# Others
show_progress: True

# TedRec Model Settings
n_layers: 2
n_heads: 2
hidden_size: 300
inner_size: 256
hidden_dropout_prob: 0.5
attn_dropout_prob: 0.5
hidden_act: 'gelu'
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: 'CE'
plm_suffix: text_feat
plm_size: 384
adaptor_dropout_prob: 0.2
adaptor_layers: [384, 300]
temperature: 0.2
n_exps: 8
